<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>分值记录详情</title>
    <meta content="webkit" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" name="viewport"/>
    <link rel="stylesheet" th:href="@{/css/xadmin.css}">
    <link rel="stylesheet" th:href="@{/css/font.css}">
    <script charset="utf-8" th:src="@{/js/jquery.min.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/layui/layui.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/xadmin.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/vue.js}" type="text/javascript"></script>
</head>
<body>
<div class="layui-fluid" id="vmViewRecord">
    <div class="layui-row">
        <form class="layui-form">
                                                                            <div class="layui-form-item">
                        <label class="layui-form-label" for="score">
                            评分
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="record.score" class="layui-input" id="score"
                                       name="score"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="serviceId">
                            家政编号
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="record.serviceId" class="layui-input" id="serviceId"
                                       name="serviceId"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="serviceName">
                            家政名称
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="record.serviceName" class="layui-input" id="serviceName"
                                       name="serviceName"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="userId">
                            用户编号
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="record.userId" class="layui-input" id="userId"
                                       name="userId"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="userName">
                            用户名称
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="record.userName" class="layui-input" id="userName"
                                       name="userName"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="createTime">
                            追加时间
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="record.createTime" class="layui-input" id="createTime"
                                       name="createTime"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="updateTime">
                            修改时间
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="record.updateTime" class="layui-input" id="updateTime"
                                       name="updateTime"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                        <div class="layui-form-item">
                <label class="layui-form-label"></label>
                <button class="layui-btn"  onclick="xadmin.close();"  style="width: 100px;">
                    返回
                </button>
            </div>
        </form>
    </div>
</div>
<script charset="UTF-8" type="text/javascript">

    var viewRecordId = sessionStorage.getItem("viewRecordId");

    vm = new Vue({
        el: "#vmViewRecord",
        data: {
            record: {}
        },
        methods: {},
        created: function () {
            var _this = this;
            $.ajax({
                url: "/record/findById",
                data: {
                    "id": viewRecordId
                },
                dataType: "json",
                type: "get",
                success: function (result) {
                    if (result.code === 200) {
                        _this.record = result.data;
                    } else {
                        layer.alert("获取修改分值记录信息失败！");
                    }
                }
            });

        }
    });
    layui.use(['form', 'layer', 'laydate'],function () {});
</script>
</body>
</html>
