<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>服务订单详情</title>
    <meta content="webkit" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" name="viewport"/>
    <link rel="stylesheet" th:href="@{/css/xadmin.css}">
    <link rel="stylesheet" th:href="@{/css/font.css}">
    <script charset="utf-8" th:src="@{/js/jquery.min.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/layui/layui.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/xadmin.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/vue.js}" type="text/javascript"></script>
</head>
<body>
<div class="layui-fluid" id="vmViewOrder">
    <div class="layui-row">
        <form class="layui-form">
                                                                            <div class="layui-form-item">
                        <label class="layui-form-label" for="categoryName">
                            分类名称
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="order.categoryName" class="layui-input" id="categoryName"
                                       name="categoryName"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="cleanName">
                            服务名称
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="order.cleanName" class="layui-input" id="cleanName"
                                       name="cleanName"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="categoryId">
                            分类编号
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="order.categoryId" class="layui-input" id="categoryId"
                                       name="categoryId"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="cleanId">
                            服务编号
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="order.cleanId" class="layui-input" id="cleanId"
                                       name="cleanId"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="userId">
                            用户编号
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="order.userId" class="layui-input" id="userId"
                                       name="userId"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="userName">
                            用户名称
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="order.userName" class="layui-input" id="userName"
                                       name="userName"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="serviceId">
                            家政编号
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="order.serviceId" class="layui-input" id="serviceId"
                                       name="serviceId"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="serviceName">
                            家政名称
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="order.serviceName" class="layui-input" id="serviceName"
                                       name="serviceName"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="status">
                            状态
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="order.status" class="layui-input" id="status"
                                       name="status"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                                                <div class="layui-form-item">
                        <label class="layui-form-label" for="createTime">
                            添加时间
                        </label>
                        <div class="layui-input-block">
                            <div class="layui-input-inline layui-show-xs-block">
                                <input :value="order.createTime" class="layui-input" id="createTime"
                                       name="createTime"
                                       readonly type="text">
                            </div>
                        </div>
                    </div>
                                        <div class="layui-form-item">
                <label class="layui-form-label"></label>
                <button class="layui-btn"  onclick="xadmin.close();"  style="width: 100px;">
                    返回
                </button>
            </div>
        </form>
    </div>
</div>
<script charset="UTF-8" type="text/javascript">

    var viewOrderId = sessionStorage.getItem("viewOrderId");

    vm = new Vue({
        el: "#vmViewOrder",
        data: {
            order: {}
        },
        methods: {},
        created: function () {
            var _this = this;
            $.ajax({
                url: "/order/findById",
                data: {
                    "id": viewOrderId
                },
                dataType: "json",
                type: "get",
                success: function (result) {
                    if (result.code === 200) {
                        _this.order = result.data;
                    } else {
                        layer.alert("获取修改服务订单信息失败！");
                    }
                }
            });

        }
    });
    layui.use(['form', 'layer', 'laydate'],function () {});
</script>
</body>
</html>
